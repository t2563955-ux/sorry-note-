<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: Arial, sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: float 3s ease-in-out infinite;
}

h1{
    color:#ff4d6d;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    transform: scale(1.1);
}

@keyframes float{
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-10px); }
    100%{ transform: translateY(0px); }
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation: fall linear infinite;
}

@keyframes fall{
    0%{
        transform: translateY(-10vh);
        opacity:1;
    }
    100%{
        transform: translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>I'm Really Sorry 😔</h1>
    <p id="message">You mean a lot to me.</p>
    <button onclick="nextMessage()">Click here ❤️</button>
</div>

<script>
let messages = [
"Please don't stay mad at me 🥺",
"I promise I'll do better",
"You are very special to me ❤️",
"Forgive me?"
];

let i = 0;

function nextMessage(){
    document.getElementById("message").innerText = messages[i];
    i++;
    if(i >= messages.length){
        i = 0;
    }
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
